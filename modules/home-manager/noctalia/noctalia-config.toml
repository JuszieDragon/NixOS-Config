[bar.default]
capsule = true
margin_edge = 0
margin_ends = 0
radius = 0
shadow = false
start = [ "launcher", "wallpaper", "workspaces", "cpu", "ram" ]

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "clipboard"

[desktop_widgets]
enabled = false

[idle]
pre_action_fade_seconds = 0

[location]
address = "Glenorchy"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [
    "lockscreen-login-box@winit",
    "lockscreen-login-box@DP-3",
    "lockscreen-login-box@DP-2",
    "lockscreen-login-box@DP-1"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1720.0
    cy = 1317.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 0.0
    box_width = 0.0
    cx = 720.0
    cy = 2437.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@winit"]
    box_height = 0.0
    box_width = 0.0
    cx = 356.0
    cy = 2393.0
    output = "winit"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@winit".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[shell]
telemetry_enabled = true

    [shell.panel]
    open_near_click_control_center = true

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [[shell.session.actions]]
    action = "logout"
    enabled = false
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = false
    shortcut = "3"
    variant = "default"

[wallpaper]
directory = "/home/justin/Pictures/Wallpapers"
transition = [ "fade" ]
transition_duration = 500
transition_on_startup = true

    [wallpaper.default]
    path = "/home/justin/Pictures/Wallpapers/Disco.png"

    [wallpaper.last]
    path = "/home/justin/Pictures/Wallpapers/Disco.png"

    [wallpaper.monitors.DP-1]
    path = "/home/justin/Pictures/Wallpapers/Disco.png"

    [wallpaper.monitors.DP-2]
    path = "/home/justin/Pictures/Wallpapers/Disco.png"

    [wallpaper.monitors.DP-3]
    path = "/home/justin/Pictures/Wallpapers/Disco.png"

[weather]
refresh_minutes = 5

[widget.clock]
format = "{:%-I:%M %p} {:%d-%m-%Y}"
